<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — Lost &amp; Found Gallery</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="header-title">FindFix</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle">☀ / ☾</button>
      <div class="profile-icon">JD</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <a href="user-dashboard.html" class="nav-link">🏠 Dashboard</a>
    <a href="lost-found-gallery.html" class="nav-link active">🔍 Lost &amp; Found Gallery</a>
    <a href="activity-history.html" class="nav-link">📋 Activity History</a>
    <div class="sidebar-bottom">
      <a href="login.html" class="btn btn-secondary btn-sm btn-full">Logout</a>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <main class="main" id="main">
    <div class="page-title">Lost &amp; Found Gallery</div>
    <div class="page-subtitle">Browse approved found items. Is one of these yours?</div>

    <div style="margin-bottom: 20px; max-width: 600px; display: flex; gap: 10px;">
      <input type="text" id="gallery-search" class="form-control" placeholder="Search by item name..." style="flex: 1;" oninput="filterGallery()">
      <select id="gallery-category" class="form-control" style="width: 180px;" onchange="filterGallery()">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing &amp; Accessories</option>
        <option value="School Supplies">School Supplies</option>
        <option value="Personal Item">Personal Item</option>
      </select>
    </div>

    <div class="gallery-grid" id="gallery-grid">
      <!-- Dynamic Content -->
      <div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-muted);">Loading gallery items...</div>
    </div>
  </main>

  <style>
    /* Ensure dynamic cards look good */
    .gallery-img { height: 180px; background: var(--bg-alt); border-radius: 8px; overflow: hidden; }
    .gallery-item-title { font-weight: 600; margin-top: 14px; font-size: 1.1rem; }
    .gallery-item-meta { font-size: 0.9rem; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }
  </style>

  <script src="../js/app.js"></script>
  <script src="../js/shared.js"></script>
</body>

</html>
