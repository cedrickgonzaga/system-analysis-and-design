<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — Login</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <div class="public-wrap">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p>Sign in to your FindFix account.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">School Email</label>
          <input class="form-control" type="email" id="email" placeholder="yourname@school.edu.ph" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input class="form-control" type="password" id="password" placeholder="Enter your password" required />
        </div>

        <div id="authMessage" style="margin-bottom: 15px; font-size: 0.85rem; text-align: center;"></div>

        <div style="text-align:right; margin-bottom: 20px;">
          <a href="forgot-password.html" style="font-size:0.82rem;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>

      <hr class="divider" />
      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted);">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>
  <script src="../js/auth.js"></script>
  <script src="../js/shared.js"></script>
</body>

</html>
