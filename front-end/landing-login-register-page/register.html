<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — Register</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>
  <div class="public-wrap">
    <div class="auth-box">
      <h2>Create an Account</h2>
      <p>Register using your school email address.</p>

      <div class="form-group">
        <label for="fname">First Name</label>
        <input class="form-control" type="text" id="fname" placeholder="Juan" />
      </div>

      <div class="form-group">
        <label for="lname">Last Name</label>
        <input class="form-control" type="text" id="lname" placeholder="Dela Cruz" />
      </div>

      <div class="form-group">
        <label for="email">School Email</label>
        <input class="form-control" type="email" id="email" placeholder="yourname@school.edu.ph" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Create a password" />
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input class="form-control" type="password" id="confirm" placeholder="Repeat your password" />
      </div>

      <button class="btn btn-primary btn-full">Register</button>

      <hr class="divider" />
      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted);">
        Already have an account? <a href="login.html">Back to Login</a>
      </p>
    </div>
  </div>
  <script src="/front-end/js/shared.js"></script>
</body>

</html>
