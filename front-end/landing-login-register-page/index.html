<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — Home</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .hero {
      text-align: center;
      max-width: 560px;
    }

    .hero .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-btns .btn {
      min-width: 130px;
    }
  </style>
</head>

<body>
  <div class="public-wrap">
    <div class="hero">
      <div class="logo">FindFix</div>
      <h1>Report Issues. Recover Items. Stay Informed.</h1>
      <p>
        FindFix is your school's all-in-one platform for submitting facility issue
        reports and lost &amp; found item notifications. Keep your campus safe and
        organized — one report at a time.
      </p>
      <div class="hero-btns">
        <a href="login.html" class="btn btn-primary">Login</a>
        <a href="register.html" class="btn btn-secondary">Register</a>
      </div>
    </div>
  </div>
  <script src="../js/shared.js"></script>
</body>

</html>
