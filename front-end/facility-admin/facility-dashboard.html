<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — Facility Admin Dashboard</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="header-title">FindFix</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle">☀ / ☾</button>
      <div class="profile-icon">FA</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <a href="facility-dashboard.html" class="nav-link active">🏠 Dashboard</a>
    <a href="facility-tickets.html" class="nav-link">🎫 Tickets</a>
    <a href="facility-generate-summary.html" class="nav-link">📄 Generate Summary</a>
    <div class="sidebar-bottom">
      <a href="login.html" class="btn btn-secondary btn-sm btn-full">Logout</a>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <main class="main" id="main">
    <div class="page-title">Facility Admin Dashboard</div>
    <div class="page-subtitle" id="user-greeting">Overview of facility-related issue tickets assigned to you.</div>

    <div class="grid-3" style="margin-bottom:28px;">
      <div class="stat-card">
        <div class="stat-value" id="stats-pending">0</div>
        <div class="stat-label">Open Tickets</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stats-progress">0</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stats-resolved">0</div>
        <div class="stat-label">Resolved This Month</div>
      </div>
    </div>

    <div class="section-head">
      <h3>Recent Tickets</h3>
      <a href="facility-tickets.html" class="btn btn-secondary btn-sm">View All</a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticket #</th>
            <th>Issue</th>
            <th>Location</th>
            <th>Submitted</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="recent-tickets-table">
          <!-- Dynamic Content -->
          <tr><td colspan="5" style="text-align:center; padding:20px;">Loading recent tickets...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/shared.js"></script>
</body>

</html>
