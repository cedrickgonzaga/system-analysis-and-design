<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FindFix — Forgot Password</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="public-wrap">
    <div class="auth-box">
      <h2>Forgot Password</h2>
      <p>Enter your school email and we'll send you a reset link.</p>

      <div class="form-group">
        <label for="email">School Email</label>
        <input class="form-control" type="email" id="email" placeholder="yourname@school.edu.ph"/>
      </div>

      <button class="btn btn-primary btn-full">Send Reset Link</button>

      <hr class="divider"/>
      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted);">
        <a href="login.html">← Back to Login</a>
      </p>
    </div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
