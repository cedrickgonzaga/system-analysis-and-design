<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FindFix — Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="public-wrap">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p>Sign in to your FindFix account.</p>

      <div class="form-group">
        <label for="email">School Email</label>
        <input class="form-control" type="email" id="email" placeholder="yourname@school.edu.ph"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Enter your password"/>
      </div>

      <div style="text-align:right; margin-bottom: 20px;">
        <a href="forgot-password.html" style="font-size:0.82rem;">Forgot Password?</a>
      </div>

      <a href="user-dashboard.html" class="btn btn-primary btn-full">Login</a>

      <hr class="divider"/>
      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted);">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>
  <script src="shared.js"></script>
</body>
</html>
