<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — Found Item Gallery (Security)</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="header-title">FindFix</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle">☀ / ☾</button>
      <div class="profile-icon">SA</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <a href="security-dashboard.html" class="nav-link">🏠 Dashboard</a>
    <a href="security-pending-posts.html" class="nav-link">⏳ Pending Posts</a>
    <a href="security-gallery.html" class="nav-link active">🖼 Found Item Gallery</a>
    <div class="sidebar-bottom">
      <a href="login.html" class="btn btn-secondary btn-sm btn-full">Logout</a>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <main class="main" id="main">
    <div class="page-title">Found Item Gallery</div>
    <div class="page-subtitle">All approved found items. You can mark items as claimed or delete posts.</div>

    <div class="gallery-grid" id="gallery-grid">
      <!-- Dynamic Content -->
      <div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-muted);">Loading items...</div>
    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/shared.js"></script>
</body>

</html>
