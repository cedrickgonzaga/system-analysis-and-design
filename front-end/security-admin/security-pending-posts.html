<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — Pending Posts</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="header-title">FindFix</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle">☀ / ☾</button>
      <div class="profile-icon">SA</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <a href="security-dashboard.html" class="nav-link">🏠 Dashboard</a>
    <a href="security-pending-posts.html" class="nav-link active">⏳ Pending Posts</a>
    <a href="security-gallery.html" class="nav-link">🖼 Found Item Gallery</a>
    <div class="sidebar-bottom">
      <a href="login.html" class="btn btn-secondary btn-sm btn-full">Logout</a>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <main class="main" id="main">
    <div class="page-title">Pending Posts</div>
    <div class="page-subtitle">Review student-submitted found item reports. Approve or reject each one.</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>#</th>
            <th>Submitted By</th>
            <th>Item Name</th>
            <th>Category</th>
            <th>Location Found</th>
            <th>Date Submitted</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="pending-items-table-body">
          <!-- Dynamic Content -->
          <tr><td colspan="8" style="text-align:center; padding:20px;">Loading pending reports...</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="../js/app.js"></script>
  <script src="../js/shared.js"></script>
</body>

</html>
