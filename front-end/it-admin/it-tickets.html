<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — IT Tickets</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="header-title">FindFix</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle">☀ / ☾</button>
      <div class="profile-icon">IT</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <a href="it-dashboard.html" class="nav-link">🏠 Dashboard</a>
    <a href="it-tickets.html" class="nav-link active">🎫 Tickets</a>
    <a href="it-generate-summary.html" class="nav-link">📄 Generate Summary</a>
    <div class="sidebar-bottom">
      <a href="login.html" class="btn btn-secondary btn-sm btn-full">Logout</a>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <main class="main" id="main">
    <div class="page-title">IT Tickets</div>
    <div class="page-subtitle">All computer-related issue tickets assigned to IT Admin.</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticket #</th>
            <th>Submitted By</th>
            <th>Issue</th>
            <th>Location</th>
            <th>Date</th>
            <th>Status</th>
            <th>Change Status</th>
          </tr>
        </thead>
        <tbody id="admin-tickets-table">
          <!-- Dynamic Content -->
          <tr><td colspan="7" style="text-align:center; padding:20px;">Loading tickets...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/shared.js"></script>
</body>

</html>
