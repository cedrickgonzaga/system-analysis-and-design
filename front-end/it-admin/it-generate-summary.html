<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FindFix — IT Generate Summary</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body>

  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span class="header-title">FindFix</span>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle">☀ / ☾</button>
      <div class="profile-icon">IT</div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <a href="it-dashboard.html" class="nav-link">🏠 Dashboard</a>
    <a href="it-tickets.html" class="nav-link">🎫 Tickets</a>
    <a href="it-generate-summary.html" class="nav-link active">📄 Generate Summary</a>
    <div class="sidebar-bottom">
      <a href="login.html" class="btn btn-secondary btn-sm btn-full">Logout</a>
    </div>
  </nav>

  <div class="overlay" id="overlay"></div>

  <main class="main" id="main">
    <div class="page-title">Generate Summary</div>
    <div class="page-subtitle">Select a month to generate a printable summary of resolved IT tickets.</div>

    <div class="card" style="max-width:420px; margin-bottom:24px;">
      <div class="form-group">
        <label for="summary-month">Select Month</label>
        <input type="month" class="form-control" id="summary-month">
      </div>
      <button class="btn btn-primary" onclick="generateSummary()">Generate &amp; Print</button>
    </div>

    <!-- Preview Table -->
    <div class="section-head">
      <h3 id="summary-title">Preview — Select a Month</h3>
    </div>
    <div class="table-wrap" id="summary-print-area">
      <table>
        <thead>
          <tr>
            <th>Ticket #</th>
            <th>Issue</th>
            <th>Location</th>
            <th>Submitted By</th>
            <th>Date Resolved</th>
          </tr>
        </thead>
        <tbody id="summary-table-body">
          <tr><td colspan="5" style="text-align:center; padding:20px; color:var(--text-muted);">Please select a month to view the summary.</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/shared.js"></script>
</body>

</html>
